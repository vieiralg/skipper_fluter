name: skipper
description: Skipper - Plataforma educativo 2D
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flame: ^1.14.0
  flame_audio: ^2.12.1
  shared_preferences: ^2.2.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/hud/
    - assets/images/objects/
    - assets/images/player/
    - assets/audio/music/
    - assets/audio/sfx/
  fonts:
    - family: PixelFont
      fonts:
        - asset: assets/fonts/pixel_font.ttf
    - family: PressStart2P
      fonts:
        - asset: assets/fonts/PressStart2P-Regular.ttf

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
